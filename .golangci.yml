version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
  settings:
    errcheck:
      # Best-effort Close/Sync on cleanup paths are idiomatic to ignore.
      exclude-functions:
        - (*github.com/ubgo/logger.Logger).Close
        - (*github.com/ubgo/logger.Logger).Sync
  exclusions:
    rules:
      # Tests and the example intentionally ignore Close/Sync errors on
      # cleanup; linting that adds noise without catching real bugs. (Tests
      # are still linted for unused/staticcheck so test-only helpers like
      # appendNumeric / raceEnabled count as used.)
      - path: _test\.go
        linters: [errcheck]
      - path: example/
        linters: [errcheck]
      # Tests intentionally pass a nil context to exercise the library's
      # documented defensive nil-ctx handling (ctxOr, eventAt, logAt).
      - path: _test\.go
        linters: [staticcheck]
        text: "SA1012"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

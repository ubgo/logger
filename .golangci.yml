version: "2"

run:
  # _test.go files intentionally ignore Close()/Sync() errors on cleanup;
  # linting them adds noise without catching real bugs.
  tests: false

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
  settings:
    errcheck:
      # Deferred/cleanup Close and best-effort Sync are idiomatic to ignore.
      exclude-functions:
        - (io.Closer).Close
        - (*github.com/ubgo/logger.Logger).Close
        - (*github.com/ubgo/logger.Logger).Sync

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

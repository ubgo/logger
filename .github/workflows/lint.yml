name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      # golangci-lint-action@v7 understands the v2 `.golangci.yml` schema.
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest

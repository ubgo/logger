name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - "."
          - "contrib/logrus"
          - "contrib/zap"
          - "contrib/otel"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: "${{ matrix.module }}/go.sum"
      - name: vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...
      - name: test (race)
        working-directory: ${{ matrix.module }}
        run: go test -race -coverprofile=cover.out ./...
      - name: alloc-regression gate (no race)
        if: matrix.module == '.'
        run: go test -run 'TestZeroAlloc' -count=1 .
      - name: gofmt
        working-directory: ${{ matrix.module }}
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - "."
          - "contrib/logrus"
          - "contrib/zap"
          - "contrib/otel"
          - "contrib/zerolog"
          - "contrib/logr"
          - "contrib/phuslu"
          - "contrib/sentry"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # 'stable' is >= the highest module `go` directive (some contrib
          # modules require go 1.25); pinning 1.24 forced a toolchain switch
          # that broke `go test -cover` (missing covdata).
          go-version: "stable"
          cache-dependency-path: "${{ matrix.module }}/go.sum"
      - name: vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...
      - name: test (race)
        working-directory: ${{ matrix.module }}
        run: go test -race -coverprofile=cover.out ./...
      - name: alloc-regression gate (no race)
        if: matrix.module == '.'
        run: go test -run 'TestZeroAlloc' -count=1 .
      - name: gofmt
        working-directory: ${{ matrix.module }}
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

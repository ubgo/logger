version: '3'

tasks:
  build:
    desc: Compile all packages
    cmds:
      - go build ./...

  test:
    desc: Run tests with the race detector
    cmds:
      - go test -race ./...

  test:cover:
    desc: Run tests with coverage report
    cmds:
      - go test -race -coverprofile=cover.out ./...
      - go tool cover -func=cover.out | tail -1

  cover:
    desc: Core coverage — total + per-function (writes coverage.out)
    cmds:
      - go test -coverprofile=coverage.out ./
      - go tool cover -func=coverage.out | tail -1
      - 'go tool cover -func=coverage.out | awk ''$3 ~ /%/ && $3 != "100.0%"'' | sort -k3 -n || true'

  cover:html:
    desc: Open the line-by-line HTML coverage report
    cmds:
      - go test -coverprofile=coverage.out ./
      - go tool cover -html=coverage.out

  bench:
    desc: Run benchmarks (allocs/op is the load-bearing number)
    cmds:
      - go test -bench=. -benchmem -run=^$ ./...

  vet:
    desc: go vet
    cmds:
      - go vet ./...

  lint:
    desc: golangci-lint (if installed)
    cmds:
      - golangci-lint run ./... || echo "golangci-lint not installed; skipped"

  fmt:
    desc: gofmt the tree
    cmds:
      - gofmt -w .

  example:
    desc: Run the demo
    cmds:
      - go run ./example

  check:
    desc: fmt + vet + race tests (pre-commit gate)
    cmds:
      - task: fmt
      - task: vet
      - task: test
